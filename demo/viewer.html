<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PageHub SDK — Viewer Demo</title>
    <link rel="stylesheet" href="../dist/editor.css" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }
      .demo-bar {
        padding: 12px 24px;
        background: #1e293b;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .demo-bar h1 {
        font-size: 16px;
        font-weight: 700;
        margin: 0;
      }
      .demo-bar a {
        color: #94a3b8;
        font-size: 13px;
        text-decoration: none;
      }
      .demo-bar a:hover {
        color: #e2e8f0;
      }
      #viewer {
        width: 100%;
        min-height: calc(100vh - 48px);
      }
    </style>
  </head>
  <body>
    <div class="demo-bar">
      <h1>Viewer Demo</h1>
      <a href="./index.html">&larr; Editor</a>
      <a href="./static.html">Static Export &rarr;</a>
    </div>
    <div id="viewer"></div>

    <script src="./vendor/react.production.min.js"></script>
    <script src="./vendor/react-dom.production.min.js"></script>
    <script>
      window.jsxRuntime = {
        jsx: function (type, props, key) {
          var p = Object.assign({}, props);
          if (key !== undefined) p.key = key;
          var children = p.children;
          delete p.children;
          if (Array.isArray(children))
            return React.createElement.apply(React, [type, p].concat(children));
          else if (children !== undefined) return React.createElement(type, p, children);
          return React.createElement(type, p);
        },
        Fragment: React.Fragment,
      };
      window.jsxRuntime.jsxs = window.jsxRuntime.jsx;
      window.jsxRuntime.jsxDEV = window.jsxRuntime.jsx;
    </script>
    <script src="./template-data-umd.js"></script>
    <script src="../dist/pagehub-viewer.umd.cjs"></script>
    <script>
      // PageHubViewer renders saved content in read-only mode
      // No editor UI, smaller bundle, Tailwind CSS compiled at runtime
      var viewer = PageHubViewer.default || PageHubViewer;
      var root = ReactDOM.createRoot(document.getElementById("viewer"));
      root.render(
        React.createElement(viewer.PageHubViewer || viewer, {
          content: window.DEMO_TEMPLATE || "",
        })
      );
    </script>
  </body>
</html>
