<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PageHub SDK — Integration Demo</title>

    <!-- Editor CSS — bundled from the SDK build -->
    <link rel="stylesheet" href="../dist/editor.css" />
    <!-- Tailwind utilities for demo chrome -->
    <link rel="stylesheet" href="./demo.tailwind.css" />

    <style>
      /* ── CSS variables from tweakcn.css (DaisyUI 5 tokens) ───────────── */
      :root {
        --primary: hsl(220.8403 56.9378% 59.0196%);
        --primary-content: hsl(0 0% 100%);
        --secondary: hsl(210 40% 96.0784%);
        --secondary-content: hsl(217.2414 32.5843% 17.451%);
        --accent: hsl(210 40% 96.0784%);
        --accent-content: hsl(217.2414 32.5843% 17.451%);
        --neutral: hsl(210 30.7692% 94.902%);
        --neutral-content: hsl(215.3846 16.318% 46.8627%);
        --base-100: hsl(0 0% 100%);
        --base-200: hsl(0 0% 98.0392%);
        --base-300: hsl(214.2857 31.8182% 91.3725%);
        --base-content: hsl(0 0% 5.8824%);
        --error: hsl(0 72.2222% 50.5882%);
        --error-content: hsl(0 0% 100%);
        --info: hsl(217.2193 91.2195% 59.8039%);
        --info-content: hsl(0 0% 100%);
        --success: hsl(142 71% 45%);
        --success-content: hsl(0 0% 100%);
        --warning: hsl(38 92% 50%);
        --warning-content: hsl(0 0% 5.8824%);
        --ring: hsl(217.2193 91.2195% 59.8039%);
        --border: 1px;
        /* Backwards-compat aliases */
        --background: var(--base-100);
        --foreground: var(--base-content);
        --card: var(--base-200);
        --card-foreground: var(--base-content);
        --popover: var(--base-100);
        --popover-foreground: var(--base-content);
        --primary-foreground: var(--primary-content);
        --secondary-foreground: var(--secondary-content);
        --accent-foreground: var(--accent-content);
        --muted: var(--neutral);
        --muted-foreground: var(--neutral-content);
        --destructive: var(--error);
        --destructive-foreground: var(--error-content);
        --sidebar: hsl(210 40% 98.0392%);
        --sidebar-foreground: hsl(0 0% 5.8824%);
        --sidebar-border: hsl(214.2857 31.8182% 91.3725%);
        --radius: 0.5rem;
        --spacing: 0.25rem;
        --font-sans:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }
      .dark {
        --primary: hsl(220.8403 56.9378% 59.0196%);
        --primary-content: hsl(0 0% 100%);
        --secondary: hsl(0 0% 26.6667%);
        --secondary-content: hsl(0 0% 90.9804%);
        --accent: hsl(0 0% 31.3725%);
        --accent-content: hsl(0 0% 90.9804%);
        --neutral: hsl(0 0% 25.098%);
        --neutral-content: hsl(0 0% 69.0196%);
        --base-100: hsl(0 0% 20%);
        --base-200: hsl(0 0% 23.9216%);
        --base-300: hsl(0 0% 25.098%);
        --base-content: hsl(0 0% 90.9804%);
        --error: hsl(0 72.2222% 50.5882%);
        --error-content: hsl(0 0% 100%);
        --info: hsl(217.2193 91.2195% 59.8039%);
        --info-content: hsl(0 0% 90.9804%);
        --success: hsl(142 71% 45%);
        --success-content: hsl(0 0% 90.9804%);
        --warning: hsl(38 92% 50%);
        --warning-content: hsl(0 0% 90.9804%);
        --ring: hsl(220.8403 56.9378% 59.0196%);
        --sidebar: hsl(0 0% 21.9608%);
        --sidebar-foreground: hsl(0 0% 90.9804%);
        --sidebar-border: hsl(0 0% 35.2941%);
        --radius: 0.5rem;
        --spacing: 0.25rem;
      }

      /* ── Reset & layout ───────────────────────────────────────────────── */
      * {
        margin: 0;
        box-sizing: border-box;
      }
      .demo-header * {
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Header bar ───────────────────────────────────────────────────── */
      .demo-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 24px;
        background: #1e293b;
        border-bottom: 1px solid #334155;
        flex-shrink: 0;
      }
      .demo-header .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-right: 16px;
      }
      .demo-header h1 {
        font-size: 16px;
        font-weight: 700;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        white-space: nowrap;
      }
      .demo-header .badge {
        font-size: 10px;
        padding: 2px 8px;
        background: #22c55e20;
        color: #22c55e;
        border: 1px solid #22c55e40;
        border-radius: 100px;
        font-weight: 600;
        white-space: nowrap;
      }
      .demo-header button {
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid #334155;
        background: #0f172a;
        color: #e2e8f0;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .demo-header button:hover {
        background: #334155;
        border-color: #475569;
      }
      .demo-header button.primary {
        background: #3b82f6;
        border-color: #3b82f6;
        color: white;
      }
      .demo-header button.primary:hover {
        background: #2563eb;
      }
      .demo-header .demo-header-link {
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid #334155;
        background: #0f172a;
        color: #e2e8f0;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .demo-header .demo-header-link:hover {
        background: #334155;
        border-color: #475569;
      }
      .demo-header .status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #94a3b8;
        margin-left: auto;
        white-space: nowrap;
      }
      .demo-header .status .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #fbbf24;
      }

      /* ── Editor container ─────────────────────────────────────────────── */
      #pagehub-editor {
        flex: 1;
        width: 100%;
        background: white;
        overflow: hidden;
      }

      /* ── Config modal ─────────────────────────────────────────────────── */
      .config-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9999;
        align-items: center;
        justify-content: center;
      }
      .config-modal-content {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 24px;
        width: 480px;
        max-width: 90vw;
        color: #e2e8f0;
        font-family: system-ui, sans-serif;
      }
      .config-modal h2 {
        margin-top: 0;
        font-size: 18px;
        margin-bottom: 16px;
        font-weight: 600;
      }
      .config-form-group {
        margin-bottom: 12px;
      }
      .config-form-group label {
        display: block;
        font-size: 13px;
        margin-bottom: 4px;
        color: #94a3b8;
      }
      .config-form-group input[type="text"],
      .config-form-group input[type="password"] {
        width: 100%;
        padding: 8px;
        border-radius: 6px;
        background: #1e293b;
        border: 1px solid #334155;
        color: #e2e8f0;
        box-sizing: border-box;
        font-size: 14px;
        outline: none;
      }
      .config-form-group input[type="text"]:focus,
      .config-form-group input[type="password"]:focus {
        border-color: #475569;
        box-shadow: 0 0 0 1px #475569;
      }
      .config-form-group input[type="text"]:-webkit-autofill,
      .config-form-group input[type="password"]:-webkit-autofill {
        -webkit-box-shadow: 0 0 0 30px #1e293b inset;
        -webkit-text-fill-color: #e2e8f0;
        caret-color: #e2e8f0;
      }
      .config-form-group input[type="color"] {
        width: 40px;
        height: 32px;
        padding: 0;
        border: none;
        background: transparent;
        cursor: pointer;
      }
      .config-form-flex {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .config-form-flex input[type="checkbox"] {
        margin: 0;
      }
      .config-form-flex label {
        margin: 0;
        cursor: pointer;
      }
      .config-buttons {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 24px;
      }
      .config-buttons button {
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        border: 1px solid #334155;
        background: #1e293b;
        color: white;
      }
      .config-buttons button.primary {
        background: #3b82f6;
        border-color: #3b82f6;
      }
    </style>
  </head>
  <body>
    <!-- Header chrome -->
    <div class="demo-header" id="controls">
      <div class="brand">
        <h1>Acme Corp — Page Builder</h1>
        <span class="badge">SDK v0.1.0</span>
      </div>

      <button onclick="handleSave()" class="primary">Save Page</button>
      <button onclick="handleToggleMode()">Toggle Edit / View</button>
      <button onclick="handleExport()">Export JSON</button>
      <button onclick="handleLoadTemplate()">Reload Template</button>
      <button onclick="handleDestroy()">Destroy</button>
      <button onclick="handleLoadFromApi()">Load from API</button>
      <button onclick="document.getElementById('config-modal').style.display = 'flex'">
        Configure
      </button>
      <a class="demo-header-link" href="./templates/index.html">Templates API</a>
      <a class="demo-header-link" href="./viewer.html">Viewer</a>
      <a class="demo-header-link" href="./static.html">Static Export</a>

      <div class="status">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">Loading SDK...</span>
      </div>
    </div>

    <!-- Editor mount point -->
    <div id="pagehub-editor"></div>

    <!-- Config modal -->
    <div class="config-modal" id="config-modal">
      <div class="config-modal-content">
        <h2>SDK Configuration</h2>
        <div class="config-form-group">
          <label>API Base URL</label>
          <input type="text" id="cfg-apiBaseUrl" placeholder="http://localhost:3000 (optional)" />
        </div>
        <div class="config-form-group">
          <label>PageHub API key (ph_…)</label>
          <input type="password" id="cfg-apiKey" placeholder="ph_…" autocomplete="off" />
        </div>
        <div class="config-form-group">
          <label>Site ID (page _id from GET /api/v1/sites)</label>
          <input type="text" id="cfg-siteId" placeholder="e.g. nanoid from create response" />
        </div>
        <div style="display: flex; gap: 12px">
          <div class="config-form-group">
            <label>Primary</label>
            <input type="color" id="cfg-primaryColor" />
          </div>
          <div class="config-form-group">
            <label>Secondary</label>
            <input type="color" id="cfg-secondaryColor" />
          </div>
          <div class="config-form-group">
            <label>Accent</label>
            <input type="color" id="cfg-accentColor" />
          </div>
        </div>
        <div class="config-form-group config-form-flex">
          <input type="checkbox" id="cfg-aiGeneration" />
          <label for="cfg-aiGeneration">Enable AI Generation</label>
        </div>
        <div class="config-form-group config-form-flex">
          <input type="checkbox" id="cfg-sidebar" />
          <label for="cfg-sidebar">Show Component Sidebar</label>
        </div>
        <div class="config-form-group config-form-flex">
          <input type="checkbox" id="cfg-toolbar" />
          <label for="cfg-toolbar">Show Top Toolbar</label>
        </div>
        <div class="config-form-group config-form-flex">
          <input type="checkbox" id="cfg-importExport" />
          <label for="cfg-importExport">Allow Import/Export</label>
        </div>
        <div class="config-buttons">
          <button onclick="document.getElementById('config-modal').style.display = 'none'">
            Cancel
          </button>
          <button class="primary" onclick="saveConfig()">Apply & Reload</button>
        </div>
      </div>
    </div>

    <!-- Dependencies -->
    <script src="./vendor/react.production.min.js"></script>
    <script src="./vendor/react-dom.production.min.js"></script>
    <script>
      // Shim react/jsx-runtime for UMD builds that externalize it
      window.jsxRuntime = {
        jsx: function (type, props, key) {
          var p = Object.assign({}, props);
          if (key !== undefined) p.key = key;
          var children = p.children;
          delete p.children;
          if (Array.isArray(children)) {
            return React.createElement.apply(React, [type, p].concat(children));
          } else if (children !== undefined) {
            return React.createElement(type, p, children);
          }
          return React.createElement(type, p);
        },
        Fragment: React.Fragment,
      };
      window.jsxRuntime.jsxs = window.jsxRuntime.jsx;
      window.jsxRuntime.jsxDEV = window.jsxRuntime.jsx;
    </script>

    <!-- Template data + SDK -->
    <script src="./template-data-umd.js"></script>
    <script src="../dist/pagehub.umd.cjs"></script>

    <!-- Demo app logic -->
    <script src="./demo.js"></script>
  </body>
</html>
